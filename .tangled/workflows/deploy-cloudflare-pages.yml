when:
  - event: ["push", "manual"]
    branch: ["master"]

engine: "nixery"

clone:
  depth: 1

dependencies:
  nixpkgs:
    - nodejs
    - curl
    - python3
    - python3Packages.fonttools
    - python3Packages.brotli

steps:
  - name: "Install dependencies"
    command: "npm ci"

  - name: "Build Eleventy site"
    command: "npm run build"

  - name: "Deploy to Cloudflare Pages"
    command: |
      set -euo pipefail
      : "${CLOUDFLARE_ACCOUNT_ID:?Missing Tangled secret: CLOUDFLARE_ACCOUNT_ID}"
      : "${CLOUDFLARE_API_TOKEN:?Missing Tangled secret: CLOUDFLARE_API_TOKEN}"
      : "${CLOUDFLARE_PAGES_PROJECT_NAME:?Missing Tangled secret: CLOUDFLARE_PAGES_PROJECT_NAME}"
      npx wrangler pages deploy _site --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME" --branch="${TANGLED_REF_NAME:-master}"
